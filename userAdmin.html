<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Photo Album</title>
    <script src="https://sdk.userbase.com/2/userbase.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 300;
        }
        
        .header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .login-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
        }
        
        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
        }
        
        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(81, 207, 102, 0.3);
        }
        
        .admin-panel {
            display: none;
        }
        
        .users-table {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .table-header h2 {
            color: #333;
            font-size: 1.8rem;
            font-weight: 300;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .user-card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .user-info {
            margin-bottom: 15px;
        }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .user-email {
            font-size: 1.0rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .user-id {
            font-size: 0.7rem;
            color: #666;
            font-family: 'Courier New', monospace;
        }
        
        .user-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 15px;
        }
        
        .status-authorized {
            background: rgba(81, 207, 102, 0.2);
            color: #2b8a3e;
        }
        
        .status-unauthorized {
            background: rgba(255, 107, 107, 0.2);
            color: #c92a2a;
        }
        
        .user-actions {
            display: flex;
            gap: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: rgba(255, 107, 107, 0.1);
            color: #c92a2a;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #ff6b6b;
        }
        
        .success {
            background: rgba(81, 207, 102, 0.1);
            color: #2b8a3e;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #51cf66;
        }
        
        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
            }
            
            .users-grid {
                grid-template-columns: 1fr;
            }
            
            .user-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="..">Back</a><h1>Admin Panel</h1>
            <p>Manage user access and permissions for your photo album</p>
        </div>
        
        <div id="loginSection" class="login-section">
            <h2>Admin Login</h2>
            <p>Please sign in with your admin credentials</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn">Sign In</button>
            </form>
            
            <div id="loginError" style="display: none;"></div>
        </div>
        
        <div id="adminPanel" class="admin-panel">
            <div class="users-table">
                <div class="table-header">
                    <h2>User Management</h2>
                    <button id="logoutBtn" class="btn btn-danger">Logout</button>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalUsers">0</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="authorizedUsers">0</div>
                        <div class="stat-label">Authorized</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="unauthorizedUsers">0</div>
                        <div class="stat-label">Unauthorized</div>
                    </div>
                </div>
                
                <button id="refreshBtn" class="btn">Refresh Users</button>
                
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
                
                <div id="usersList" class="users-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let currentAdmin = null;
        let allUsers = [];
        const PROFILES_DATABASE_NAME = 'user-profiles';

        // FIX: The Userbase admin API bearer token must NOT live in client-side JS.
        // Anyone who views source can steal it and make admin API calls directly.
        //
        // The right fix is to move getUsersFromDatabase() to a small server-side
        // endpoint (a Netlify/Vercel function, a Node proxy, etc.) that holds the
        // token in an environment variable and returns only the data this page needs.
        //
        // For now the token has been removed from this file. Replace the placeholder
        // below with your server-side proxy URL, or add the token back temporarily
        // only on a locally-served, non-public copy.
        const USERBASE_APP_ID  = 'b6a8348d-da63-495e-9600-e4f3368cc3f3';
        const USERS_PROXY_URL  = '/api/admin-users'; // <-- your server-side proxy

        // DOM elements
        const loginSection      = document.getElementById('loginSection');
        const adminPanel        = document.getElementById('adminPanel');
        const loginForm         = document.getElementById('loginForm');
        const loginError        = document.getElementById('loginError');
        const logoutBtn         = document.getElementById('logoutBtn');
        const refreshBtn        = document.getElementById('refreshBtn');
        const usersList         = document.getElementById('usersList');
        const loading           = document.getElementById('loading');
        const totalUsersEl      = document.getElementById('totalUsers');
        const authorizedUsersEl = document.getElementById('authorizedUsers');
        const unauthorizedUsersEl = document.getElementById('unauthorizedUsers');

        // FIX: Run isAdmin() check on session restore, not just on login.
        // Previously any signed-in user would land on the admin panel after a
        // page refresh without ever going through the isAdmin() gate.
        userbase.init({ appId: USERBASE_APP_ID }).then((session) => {
            if (session.user && isAdmin(session.user)) {
                showAdminPanel(session.user);
            } else if (session.user) {
                // Signed in but not an admin — sign them out and show login.
                userbase.signOut().catch(console.error);
                showLoginSection();
                showError('Access denied. Admin privileges required.');
            }
        }).catch(console.error);

        // Login form handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const user = await userbase.signIn({ username, password });
                
                if (isAdmin(user)) {
                    showAdminPanel(user);
                } else {
                    await userbase.signOut();
                    showError('Access denied. Admin privileges required.');
                }
            } catch (error) {
                showError(error.message);
            }
        });

        // Logout handler
        logoutBtn.addEventListener('click', async () => {
            try {
                await userbase.signOut();
                showLoginSection();
            } catch (error) {
                showError('Error signing out: ' + error.message);
            }
        });

        // Refresh users handler
        refreshBtn.addEventListener('click', loadUsers);

        /***************************************************************************
        * Check if user is admin.
        */
        function isAdmin(user) {
            const adminUsernames = ['stevedonie'];
            return adminUsernames.includes(user.username);
        }

        /***************************************************************************
        * Show admin panel
        */
        function showAdminPanel(user) {
            currentAdmin = user;
            loginSection.style.display = 'none';
            adminPanel.style.display = 'block';
            loadUsers();
        }

        /***************************************************************************
        * Show login section
        */
        function showLoginSection() {
            currentAdmin = null;
            loginSection.style.display = 'block';
            adminPanel.style.display = 'none';
            clearError();
        }

        /***************************************************************************
        * Load all users, update stats, display user cards
        */
        async function loadUsers() {
            loading.style.display = 'block';
            usersList.innerHTML = '';
            
            try {
                allUsers = await getUsersFromDatabase();
                await populateAllUserProfiles();
                displayUsers();
                updateStats();
            } catch (error) {
                showError('Error loading users: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        /***************************************************************************
        * Fetch the list of Userbase users.
        *
        * FIX: Token removed from client-side code. This now calls a server-side
        * proxy that holds the bearer token in an environment variable.
        * See USERS_PROXY_URL above.
        *
        * The response shape is the same as the direct Userbase admin API:
        *   { users: [ { username, userId, appId, creationDate, email }, ... ] }
        */
        async function getUsersFromDatabase() {
            const response = await fetch(USERS_PROXY_URL, { method: 'GET' });
            if (!response.ok) {
                throw new Error(`Response status: ${response.status}`);
            }
            const responseObject = await response.json();
            console.log('getUsersFromDatabase() responseObject:', responseObject);
            return responseObject.users;
        }

        /***************************************************************************
        * Open the profiles database and return a Promise that resolves with the
        * first snapshot of profiles delivered to the changeHandler.
        *
        * This helper is the key to fixing the race condition: callers can await it
        * and know the data is actually there when they proceed.
        */
        function openDatabaseAndGetProfiles() {
            return new Promise((resolve, reject) => {
                userbase.openDatabase({
                    databaseName: PROFILES_DATABASE_NAME,
                    changeHandler: (profiles) => {
                        // changeHandler fires whenever data changes; we only need
                        // the first delivery to get a consistent snapshot.
                        resolve(profiles || []);
                    }
                }).catch(reject);
            });
        }

        /***************************************************************************
        * Update user profile - change authorization status
        *
        * FIX: Was opening the database twice (once at the top, once inside the try
        * block) and then checking existingProfile synchronously before the async
        * changeHandler had a chance to fire — so existingProfile was always null
        * and new duplicate profiles were created on every auth toggle.
        *
        * Now uses openDatabaseAndGetProfiles() to await the first data snapshot
        * before deciding whether to insert or update.
        */
        async function updateUserAuth(userId, newAuthorizationStatus) {
            try {
                const allProfiles = await openDatabaseAndGetProfiles();

                const existingProfile = allProfiles.find(
                    profile => profile.item && profile.item.userId === userId
                );

                if (existingProfile) {
                    console.log(`Updating existing profile for userId: ${userId}`, existingProfile);

                    const updatedItem = {
                        ...existingProfile.item,
                        isAuthorized: newAuthorizationStatus,
                        updatedAt: new Date().toISOString(),
                        lastAuthorizedBy: currentAdmin.username,
                        authorizedAt: new Date().toISOString()
                    };

                    await userbase.updateItem({
                        databaseName: PROFILES_DATABASE_NAME,
                        itemId: existingProfile.itemId,
                        item: updatedItem
                    });

                    console.log('Profile updated successfully:', updatedItem);
                } else {
                    console.log(`No existing profile for userId: ${userId} — creating new one`);

                    const currentTime = new Date().toISOString();
                    const profileData = {
                        userId,
                        username: '',
                        email: '',
                        isAuthorized: newAuthorizationStatus,
                        lastActive: currentTime,
                        updatedAt: currentTime,
                        firstSeen: currentTime,
                        loginCount: 0,
                        deviceType: '',
                        location: '',
                        displayName: '',
                        adminNotes: '',
                        lastAuthorizedBy: currentAdmin.username,
                        authorizedAt: currentTime
                    };

                    await userbase.insertItem({
                        databaseName: PROFILES_DATABASE_NAME,
                        item: profileData
                    });

                    console.log('New profile created for userId:', userId);
                }

                showSuccess(`User authorization set to ${newAuthorizationStatus}`);
                loadUsers();

            } catch (error) {
                console.error('Error updating user profile:', error);

                if (error.name === 'DatabaseNotOpen') {
                    console.error('Database connection issue.');
                } else if (error.name === 'ItemNotFound') {
                    console.error('Attempted to update non-existent profile.');
                } else if (error.name === 'ItemAlreadyExists') {
                    console.error('Profile creation conflict.');
                }

                showError('Error updating authorization: ' + error.message);
            }
        }

        /***************************************************************************
        * After getUsersFromDatabase() populates allUsers, call this to attach each
        * user's profile data from the profiles database.
        *
        * FIX: Declared allProfiles with const instead of accidentally creating a
        * global variable.
        */
        async function populateAllUserProfiles() {
            console.log('Populating all user profiles');
            try {
                // FIX: await the snapshot so profile data is available synchronously
                // in the loop below, instead of relying on the changeHandler firing
                // at an unpredictable time.
                const allProfiles = await openDatabaseAndGetProfiles();  // FIX: was an undeclared global

                allProfiles.forEach(profile => {
                    let wasProfileAssociated = false;

                    allUsers.forEach(user => {
                        if (user.userId === profile.item.userId && !user.profile) {
                            user.profile = profile;
                            console.log(`Associated profile ${profile.itemId} with user ${user.username}`);
                            wasProfileAssociated = true;
                        }
                    });

                    if (!wasProfileAssociated) {
                        console.log(`Deleting unassociated profile ${profile.itemId}`);
                        userbase.deleteItem({
                            databaseName: PROFILES_DATABASE_NAME,
                            itemId: profile.itemId
                        }).then(() => {
                            console.log('Deletion successful');
                        }).catch(console.error);
                    }
                });

            } catch (error) {
                console.error('Error populating user profiles:', error);
            }

            allUsers.forEach(user => {
                if (!user.profile) {
                    console.log(`User ${user.username} has no associated profile`);
                }
            });
        }

        /***************************************************************************
        * Display users in the grid
        */
        function displayUsers() {
            console.log(`Displaying all ${allUsers.length} users`);
            usersList.innerHTML = '';
            
            allUsers.forEach(userData => {
                const userCard = createUserCard(userData);
                usersList.appendChild(userCard);
                console.log('Displaying user:', JSON.stringify(userData, null, 2));
            });
        }

        /***************************************************************************
        * Create user card element
        */
        function createUserCard(userData) {
            const userName     = userData.username;
            const isAuthorized = userData.profile?.item?.isAuthorized || false;
            const userId       = userData.userId;
            const userEmail    = userData.email;
            const lastActive   = userData.profile?.item?.lastActive || 'no profile yet';
            
            const card = document.createElement('div');
            card.className = 'user-card';
            
            card.innerHTML = `
                <div class="user-info">
                    <div class="user-name">${userName}</div>
                    <div class="user-email">${userEmail}</div>
                    <div class="user-id">ID: ${userId}</div>
                    <div class="user-id">Last active: ${lastActive}</div>
                </div>
                <div class="user-status ${isAuthorized ? 'status-authorized' : 'status-unauthorized'}">
                    ${isAuthorized ? 'Authorized' : 'Unauthorized'}
                </div>
                <div class="user-actions">
                    <button class="btn ${isAuthorized ? 'btn-danger' : 'btn-success'}" 
                            onclick="updateUserAuth('${userId}', ${!isAuthorized})">
                        ${isAuthorized ? 'Revoke Access' : 'Grant Access'}
                    </button>
                </div>
            `;
            
            return card;
        }

        /***************************************************************************
        * Update statistics
        */
        function updateStats() {
            const total       = allUsers.length;
            const authorized  = allUsers.filter(u => u.profile?.item?.isAuthorized).length;
            const unauthorized = total - authorized;
            
            totalUsersEl.textContent       = total;
            authorizedUsersEl.textContent  = authorized;
            unauthorizedUsersEl.textContent = unauthorized;
        }

        /***************************************************************************
        * Show error message in the login error div
        */
        function showError(message) {
            loginError.innerHTML = `<div class="error">${message}</div>`;
            loginError.style.display = 'block';
        }

        /***************************************************************************
        * Clear login error div
        */
        function clearError() {
            loginError.style.display = 'none';
        }

        /***************************************************************************
        * Show a temporary success message below the Refresh button
        */
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'success';
            successDiv.textContent = message;
            
            refreshBtn.parentNode.insertBefore(successDiv, refreshBtn.nextSibling);
            
            setTimeout(() => successDiv.remove(), 3000);
        }
    </script>
</body>
</html>
